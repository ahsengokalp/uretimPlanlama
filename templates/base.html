<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Uretim Planlama{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="app-topbar">
        <div class="brand-wrap">
            <div class="brand-logo">Dikkan</div>
            <div class="brand-copy">
                <div class="brand-title">Uretim</div>
                <span class="brand-subtitle">{% block topbar_title %}Sabah Toplanti Sistemi{% endblock %}</span>
            </div>
        </div>
        <nav class="top-actions">
            {% block top_actions %}
                <a class="nav-chip nav-chip--solid" href="/">Ana Panel</a>
            {% endblock %}
        </nav>
    </header>

    <main class="page-wrap">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
